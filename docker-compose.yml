services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-mcp-server
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - mcp-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mcp-network

  redis:
    image: redis:7-alpine
    container_name: enterprise-mcp-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mcp-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: enterprise-mcp-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mcp-network

volumes:
  mcp-logs:
  redis-data:

networks:
  mcp-network:
    driver: bridge
